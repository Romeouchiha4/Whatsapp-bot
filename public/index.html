<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>𝕴𝖙𝖝 𝕽𝕺𝕸𝕰𝕺 — Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  :root {
    --crimson: #c0392b;
    --crimson-glow: #e74c3c;
    --dark-red: #7b0000;
    --bg: #050505;
    --glass: rgba(20,0,0,0.55);
    --glass-border: rgba(192,57,43,0.3);
    --text: #f0d0d0;
    --muted: rgba(240,208,208,0.45);
    --input-bg: rgba(30,0,0,0.6);
  }

  body {
    min-height: 100vh;
    background: var(--bg);
    font-family: 'Rajdhani', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    color: var(--text);
  }

  /* ── Animated BG ── */
  .bg-canvas {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% -10%, rgba(120,0,0,0.35) 0%, transparent 70%),
      radial-gradient(ellipse 50% 40% at 80% 100%, rgba(80,0,0,0.25) 0%, transparent 60%),
      #050505;
  }

  /* Sharingan spinning rings */
  .sharingan-bg {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 0;
    pointer-events: none;
    opacity: 0.06;
  }
  .ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid var(--crimson);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }
  .ring:nth-child(1) { width:320px; height:320px; animation: spin 20s linear infinite; }
  .ring:nth-child(2) { width:500px; height:500px; animation: spin 30s linear infinite reverse; }
  .ring:nth-child(3) { width:700px; height:700px; animation: spin 45s linear infinite; }
  .ring:nth-child(4) { width:900px; height:900px; animation: spin 60s linear infinite reverse; }
  @keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }

  /* ── Card ── */
  .card {
    position: relative; z-index: 10;
    width: 420px;
    max-width: calc(100vw - 32px);
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 18px;
    padding: 42px 38px 36px;
    backdrop-filter: blur(24px) saturate(150%);
    -webkit-backdrop-filter: blur(24px) saturate(150%);
    box-shadow:
      0 0 0 1px rgba(192,57,43,0.08),
      0 8px 40px rgba(0,0,0,0.7),
      0 0 60px rgba(192,57,43,0.12),
      inset 0 1px 0 rgba(255,100,100,0.07);
    animation: fadeUp 0.6s cubic-bezier(.16,1,.3,1) both;
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(28px) scale(0.97); }
    to   { opacity:1; transform: translateY(0) scale(1); }
  }

  /* ── Logo ── */
  .logo-wrap { text-align: center; margin-bottom: 28px; }
  .sharingan-icon {
    width: 68px; height: 68px;
    margin: 0 auto 10px;
    position: relative;
  }
  .sharingan-icon svg {
    width: 100%; height: 100%;
    filter: drop-shadow(0 0 14px rgba(192,57,43,0.9)) drop-shadow(0 0 4px #e74c3c);
    animation: pulse-glow 2.5s ease-in-out infinite;
  }
  @keyframes pulse-glow {
    0%,100% { filter: drop-shadow(0 0 14px rgba(192,57,43,0.9)) drop-shadow(0 0 4px #e74c3c); }
    50%      { filter: drop-shadow(0 0 26px rgba(231,76,60,1)) drop-shadow(0 0 8px #c0392b); }
  }
  .logo-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 18px; font-weight: 900;
    letter-spacing: 3px;
    color: var(--crimson-glow);
    text-shadow: 0 0 18px rgba(231,76,60,0.7);
    text-transform: uppercase;
  }
  .logo-sub {
    font-size: 11px; color: var(--muted);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* ── Tab Toggle ── */
  .tabs {
    display: flex;
    background: rgba(10,0,0,0.5);
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 28px;
    border: 1px solid rgba(192,57,43,0.15);
  }
  .tab-btn {
    flex: 1; padding: 9px;
    background: transparent;
    border: none; cursor: pointer;
    font-family: 'Orbitron', sans-serif;
    font-size: 11px; font-weight: 700;
    letter-spacing: 2px;
    color: var(--muted);
    border-radius: 7px;
    transition: all 0.3s;
    text-transform: uppercase;
  }
  .tab-btn.active {
    background: linear-gradient(135deg, #7b0000, #c0392b);
    color: #fff;
    box-shadow: 0 0 16px rgba(192,57,43,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
  }

  /* ── Forms ── */
  .form-panel { display: none; }
  .form-panel.active { display: block; animation: fadeIn 0.3s ease both; }
  @keyframes fadeIn { from {opacity:0; transform:translateY(6px);} to {opacity:1; transform:none;} }

  .field { margin-bottom: 18px; }
  .field label {
    display: block;
    font-size: 11px; font-weight: 600;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 7px;
  }
  .field input {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid rgba(192,57,43,0.2);
    border-radius: 9px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .field input::placeholder { color: rgba(240,208,208,0.25); }
  .field input:focus {
    border-color: var(--crimson);
    box-shadow: 0 0 0 3px rgba(192,57,43,0.18), 0 0 16px rgba(192,57,43,0.12);
  }

  /* ── Submit Btn ── */
  .submit-btn {
    width: 100%; padding: 13px;
    margin-top: 6px;
    background: linear-gradient(135deg, #7b0000 0%, #c0392b 60%, #e74c3c 100%);
    border: none; border-radius: 10px;
    font-family: 'Orbitron', sans-serif;
    font-size: 12px; font-weight: 700;
    letter-spacing: 3px;
    color: #fff;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.3s;
    box-shadow: 0 0 20px rgba(192,57,43,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
    position: relative; overflow: hidden;
  }
  .submit-btn::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.08));
    opacity: 0; transition: opacity 0.3s;
  }
  .submit-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 0 32px rgba(231,76,60,0.6), inset 0 1px 0 rgba(255,255,255,0.15);
  }
  .submit-btn:hover::after { opacity: 1; }
  .submit-btn:active { transform: translateY(0); }

  /* ── Divider ── */
  .divider {
    display: flex; align-items: center; gap: 10px;
    margin: 20px 0;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(192,57,43,0.3), transparent);
  }
  .divider span { font-size: 11px; color: var(--muted); letter-spacing: 1px; }

  /* ── Footer ── */
  .card-footer {
    margin-top: 22px; text-align: center;
    font-size: 11px; color: var(--muted);
    letter-spacing: 1px;
  }
  .card-footer span {
    color: var(--crimson-glow);
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    text-shadow: 0 0 8px rgba(231,76,60,0.5);
  }

  /* corner decorations */
  .corner { position: absolute; width: 16px; height: 16px; }
  .corner.tl { top:10px; left:10px; border-top:1px solid var(--crimson); border-left:1px solid var(--crimson); }
  .corner.tr { top:10px; right:10px; border-top:1px solid var(--crimson); border-right:1px solid var(--crimson); }
  .corner.bl { bottom:10px; left:10px; border-bottom:1px solid var(--crimson); border-left:1px solid var(--crimson); }
  .corner.br { bottom:10px; right:10px; border-bottom:1px solid var(--crimson); border-right:1px solid var(--crimson); }
</style>
</head>
<body>

<div class="bg-canvas"></div>
<div class="sharingan-bg">
  <div class="ring"></div>
  <div class="ring"></div>
  <div class="ring"></div>
  <div class="ring"></div>
</div>

<div class="card">
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div class="logo-wrap">
    <div class="sharingan-icon">
      <!-- Sharingan SVG -->
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="46" fill="#0a0000" stroke="#c0392b" stroke-width="1.5"/>
        <circle cx="50" cy="50" r="18" fill="#c0392b"/>
        <circle cx="50" cy="50" r="8" fill="#0a0000"/>
        <!-- 3 tomoe -->
        <g fill="#c0392b">
          <ellipse cx="50" cy="27" rx="5" ry="8" transform="rotate(0 50 50)"/>
          <ellipse cx="50" cy="27" rx="5" ry="8" transform="rotate(120 50 50)"/>
          <ellipse cx="50" cy="27" rx="5" ry="8" transform="rotate(240 50 50)"/>
        </g>
        <circle cx="50" cy="50" r="5" fill="#0a0000"/>
        <circle cx="50" cy="50" r="38" fill="none" stroke="rgba(192,57,43,0.4)" stroke-width="1"/>
      </svg>
    </div>
    <div class="logo-title">𝕴𝖙𝖝 𝕽𝕺𝕸𝕰𝕺</div>
    <div class="logo-sub">Secure Access Portal</div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Login</button>
    <button class="tab-btn" id="tab-register" onclick="switchTab('register')">Register</button>
  </div>

  <!-- LOGIN FORM -->
  <div class="form-panel active" id="panel-login">
    <div class="field">
      <label>Username / Email</label>
      <input type="text" placeholder="Enter your username"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" placeholder="••••••••"/>
    </div>
    <button class="submit-btn">⟶ Enter the Realm</button>
    <div class="divider"><span>or</span></div>
    <div style="text-align:center; font-size:12px; color:var(--muted);">
      New here? <a href="#" onclick="switchTab('register')" style="color:var(--crimson-glow); text-decoration:none;">Create account →</a>
    </div>
  </div>

  <!-- REGISTER FORM -->
  <div class="form-panel" id="panel-register">
    <div class="field">
      <label>Username</label>
      <input type="text" placeholder="Choose a username"/>
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" placeholder="your@email.com"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" placeholder="Create password"/>
    </div>
    <div class="field">
      <label>Confirm Password</label>
      <input type="password" placeholder="Repeat password"/>
    </div>
    <button class="submit-btn">⟶ Join the Uchiha</button>
    <div class="divider"><span>or</span></div>
    <div style="text-align:center; font-size:12px; color:var(--muted);">
      Already have access? <a href="#" onclick="switchTab('login')" style="color:var(--crimson-glow); text-decoration:none;">Sign in →</a>
    </div>
  </div>

  <div class="card-footer">
    Powered by <span>𝕴𝖙𝖝 𝕽𝕺𝕸𝕰𝕺</span> • v2.0.0
  </div>
</div>

<script>
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('panel-' + tab).classList.add('active');
}
</script>
</body>
</html>
